<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>INGEST</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;700;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0a;
    --fg: #f4f4f4;
    --accent: #ff5b1f;
    --muted: #555;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Geist', system-ui, -apple-system, sans-serif;
  }
  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr auto;
    height: 100vh;
  }
  .panel {
    padding: 6vh 5vw;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 40px;
  }
  h1 {
    font-size: clamp(80px, 14vw, 240px);
    font-weight: 900;
    letter-spacing: -0.05em;
    line-height: 0.82;
  }
  .controls {
    display: flex;
    flex-direction: column;
    gap: 28px;
    max-width: 560px;
  }
  input {
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--muted);
    color: var(--fg);
    font-size: clamp(28px, 4vw, 56px);
    font-weight: 700;
    padding: 12px 0;
    font-family: inherit;
    outline: none;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    transition: border-color 0.2s;
  }
  input::placeholder { color: var(--muted); }
  input:focus { border-bottom-color: var(--accent); }
  #ingest {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 22px 36px;
    font-size: clamp(20px, 2.2vw, 28px);
    font-weight: 900;
    letter-spacing: 0.14em;
    cursor: pointer;
    font-family: inherit;
    align-self: flex-start;
    transition: transform 0.1s, background 0.2s;
  }
  #ingest:hover { background: var(--fg); }
  #ingest:active { transform: translateY(2px); }
  #ingest:disabled { opacity: 0.35; cursor: not-allowed; }
  .menu {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px 14px;
    margin-top: 4px;
    max-width: 560px;
  }
  .menu-label {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--muted);
    margin-right: 4px;
  }
  .menu-item {
    background: transparent;
    border: none;
    border-bottom: 1px solid transparent;
    color: var(--muted);
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 4px 0;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .menu-item:hover {
    color: var(--fg);
    border-bottom-color: var(--accent);
  }
  .menu-item.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .stage { position: relative; background: #050505; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; }
  .player {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: minmax(220px, 1.4fr) 2fr auto;
    align-items: center;
    gap: 24px;
    padding: 12px 28px;
    background: #050505;
    border-top: 1px solid #161616;
    height: 76px;
  }
  .player-track {
    display: flex;
    align-items: center;
    gap: 14px;
    min-width: 0;
  }
  .player-art {
    width: 48px;
    height: 48px;
    background: #1a1a1a;
    flex-shrink: 0;
    object-fit: cover;
  }
  .player-art[src=""] { display: block; }
  .player-meta { min-width: 0; }
  .player-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--fg);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .player-artist {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player-progress {
    display: flex;
    align-items: center;
    gap: 16px;
    min-width: 0;
  }
  .status {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--fg);
    white-space: nowrap;
  }
  .bar {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.08);
    overflow: hidden;
  }
  .bar > i {
    display: block;
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.15s linear;
  }
  .player-play {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-size: 14px;
    font-weight: 900;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
    padding: 0;
    transition: background 0.2s, transform 0.1s;
  }
  .player-play:hover { background: var(--fg); }
  .player-play:active { transform: scale(0.95); }
  .player-play:disabled { opacity: 0.3; cursor: not-allowed; }
  #invent {
    background: transparent;
    border: 1px dashed var(--muted);
    color: var(--fg);
    font-family: inherit;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 7px 14px;
    cursor: pointer;
    align-self: flex-start;
    margin-top: 4px;
    transition: border-color 0.15s, color 0.15s;
  }
  #invent:hover { border-color: var(--accent); color: var(--accent); }
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
  }
  .modal.open { display: flex; }
  .modal-card {
    background: var(--bg);
    border: 1px solid #222;
    padding: 32px;
    width: 100%;
    max-width: 520px;
    max-height: calc(100vh - 48px);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .modal-card h2 {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -0.02em;
  }
  .modal-card label {
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .modal-card input,
  .modal-card select,
  .modal-card textarea {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--muted);
    color: var(--fg);
    font-size: 16px;
    font-weight: 700;
    padding: 8px 0;
    font-family: inherit;
    outline: none;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .modal-card textarea {
    resize: none;
    min-height: 56px;
    text-transform: none;
    font-weight: 400;
    letter-spacing: 0;
  }
  .modal-card input:focus,
  .modal-card select:focus,
  .modal-card textarea:focus {
    border-bottom-color: var(--accent);
  }
  .modal-card input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    background: transparent;
    border: none;
    padding: 0;
    height: 22px;
    cursor: pointer;
  }
  .modal-card input[type="range"]::-webkit-slider-runnable-track {
    height: 2px;
    background: var(--muted);
  }
  .modal-card input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: var(--accent);
    border-radius: 0;
    margin-top: -6px;
  }
  .modal-card input[type="range"]::-moz-range-track {
    height: 2px;
    background: var(--muted);
  }
  .modal-card input[type="range"]::-moz-range-thumb {
    width: 14px;
    height: 14px;
    background: var(--accent);
    border: none;
    border-radius: 0;
  }
  .modal-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }
  .modal-card label .val {
    color: var(--fg);
    font-weight: 700;
    letter-spacing: 0;
    margin-left: 8px;
    text-transform: none;
  }
  .modal-actions {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    margin-top: 8px;
  }
  .modal-actions button {
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--muted);
    padding: 12px 22px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.15s, background 0.2s;
  }
  .modal-actions .primary {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }
  .modal-actions button:hover { border-color: var(--fg); }
  .modal-actions .primary:hover { background: var(--fg); }
  .modal-status {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    min-height: 14px;
  }
  .modal-status.error { color: var(--accent); }
  @media (max-width: 820px) {
    html, body { height: auto; overflow: auto; -webkit-overflow-scrolling: touch; }
    main { grid-template-columns: 1fr; grid-template-rows: auto auto auto; height: auto; min-height: 100vh; }
    .stage { height: 50vh; }
    .panel { padding: 18px 18px 14px; gap: 14px; }
    h1 { font-size: clamp(56px, 14vw, 96px); }
    .controls { gap: 14px; max-width: 100%; }
    input {
      font-size: 22px;
      padding: 10px 0;
    }
    #ingest {
      width: 100%;
      text-align: center;
      align-self: stretch;
      padding: 16px 18px;
      font-size: 16px;
      letter-spacing: 0.2em;
    }
    #invent {
      width: 100%;
      text-align: center;
      align-self: stretch;
      padding: 12px 14px;
      margin-top: 0;
    }
    .menu {
      gap: 2px 14px;
      margin-top: 0;
      max-width: 100%;
    }
    .menu-item { padding: 2px 0; min-height: 20px; line-height: 1.1; }
    .stage { height: 30vh; min-height: 160px; }
    .player {
      height: auto;
      padding: 8px 14px;
      grid-template-columns: 1fr auto;
      gap: 12px;
    }
    .player-progress { display: none; }
    .player-art { width: 40px; height: 40px; }
    .player-title { font-size: 13px; }
    .player-artist { font-size: 10px; }
    .player-play { width: 40px; height: 40px; font-size: 12px; }
    .modal { padding: 12px; }
    .modal-card {
      padding: 22px;
      gap: 16px;
      max-height: calc(100vh - 24px);
    }
    .modal-card h2 { font-size: 22px; }
    .modal-card input[type="range"]::-webkit-slider-thumb {
      width: 20px;
      height: 20px;
      margin-top: -9px;
    }
    .modal-card input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
    }
    .modal-actions button { padding: 14px 18px; flex: 1; }
  }
  @media (max-width: 480px) {
    .panel { padding: 14px 14px 10px; gap: 10px; }
    h1 { font-size: clamp(52px, 16vw, 72px); }
    input { font-size: 20px; padding: 8px 0; }
    .menu-label { font-size: 10px; letter-spacing: 0.25em; }
    .menu-item { font-size: 11px; }
    .stage { min-height: 180px; }
    .modal-row { grid-template-columns: 1fr; gap: 14px; }
  }
</style>
</head>
<body>
<main>
  <section class="panel">
    <h1>DRUGS</h1>
    <div class="controls">
      <input id="drug" type="text" placeholder="LSD" autocomplete="off" spellcheck="false" />
      <div class="menu" id="menu">
        <span class="menu-label">MENU /</span>
      </div>
      <button id="ingest">INGEST</button>
      <button id="invent" type="button">+ INVENT DRUG</button>
    </div>
  </section>
  <section class="stage">
    <canvas id="c"></canvas>
  </section>
  <footer class="player">
    <div class="player-track">
      <img class="player-art" id="player-art" alt="" />
      <div class="player-meta">
        <div class="player-title" id="player-title">—</div>
        <div class="player-artist" id="player-artist">No track</div>
      </div>
    </div>
    <div class="player-progress">
      <div class="status" id="status">SOBER</div>
      <div class="bar"><i id="bar"></i></div>
    </div>
    <button class="player-play" id="player-play" aria-label="Play/pause" disabled>▶</button>
  </footer>
</main>

<div class="modal" id="modal">
  <div class="modal-card">
    <h2>INVENT DRUG</h2>
    <label>
      NAME
      <input id="m-name" type="text" placeholder="MOONDUST" maxlength="24" autocomplete="off" spellcheck="false" />
    </label>
    <div class="modal-row">
      <label>
        INTENSITY <span class="val" id="m-int-val">1.0</span>
        <input id="m-intensity" type="range" min="0.2" max="2.0" step="0.1" value="1.0" />
      </label>
      <label>
        DURATION <span class="val" id="m-dur-val">18s</span>
        <input id="m-duration" type="range" min="6" max="45" step="1" value="18" />
      </label>
    </div>
    <label>
      MOTION
      <select id="m-motion">
        <option value="float">FLOAT — gentle bob</option>
        <option value="wobble">WOBBLE — drunken sway</option>
        <option value="pulse">PULSE — head throb</option>
        <option value="fragment">FRAGMENT — glitch jumps</option>
        <option value="jitter">JITTER — twitch</option>
        <option value="slump">SLUMP — drowsy lean</option>
        <option value="breathe">BREATHE — slow scale</option>
        <option value="spin">SPIN — continuous rotate</option>
        <option value="kipup">KIP-UP — knockdown cycle</option>
        <option value="vanish">VANISH — k-hole fold</option>
      </select>
    </label>
    <label>
      PALETTE
      <select id="m-palette">
        <option value="none">DEFAULT — no color shift</option>
        <option value="rainbow">RAINBOW — hue cycle</option>
        <option value="warm">WARM — red / orange</option>
        <option value="cool">COOL — blue / purple</option>
        <option value="neon">NEON — hot glow</option>
        <option value="monochrome">MONOCHROME — drained</option>
      </select>
    </label>
    <label>
      BACKGROUND TRIP
      <select id="m-shader">
        <option value="0">NONE</option>
        <option value="1">PSYCHEDELIC KALEIDOSCOPE</option>
        <option value="2">GLOW WAVES</option>
        <option value="3">GEOMETRIC RUSH</option>
        <option value="4">EUPHORIC SPIRAL</option>
        <option value="5">WHITE VOID</option>
      </select>
    </label>
    <label>
      THEME SONG
      <input id="m-song" type="text" placeholder="ARTIST — SONG TITLE" autocomplete="off" />
    </label>
    <div class="modal-status" id="m-status"></div>
    <div class="modal-actions">
      <button type="button" id="m-cancel">CANCEL</button>
      <button type="button" id="m-submit" class="primary">CREATE</button>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050505);

const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 100);
camera.position.set(0, 1.4, 6.5);
camera.lookAt(0, 1.1, 0);

const avatar = new THREE.Group();
scene.add(avatar);

const skin = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.45, metalness: 0.05 });
const eyeMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1 });

const head = new THREE.Mesh(new THREE.IcosahedronGeometry(0.9, 4), skin);
head.position.y = 2;
avatar.add(head);

const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.65, 1.4, 8, 16), skin);
body.position.y = 0.5;
avatar.add(body);

const eyeGeo = new THREE.SphereGeometry(0.1, 16, 16);
const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
leftEye.position.set(-0.28, 2.12, 0.78);
avatar.add(leftEye);
const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
rightEye.position.set(0.28, 2.12, 0.78);
avatar.add(rightEye);

const ground = new THREE.Mesh(
  new THREE.CircleGeometry(3, 32),
  new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 1 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.4;
scene.add(ground);

scene.add(new THREE.AmbientLight(0xffffff, 0.45));
const key = new THREE.DirectionalLight(0xffffff, 1.4);
key.position.set(3, 6, 5);
scene.add(key);
const rim = new THREE.DirectionalLight(0xff5b1f, 0.55);
rim.position.set(-4, 2, -3);
scene.add(rim);

const tripMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uIntensity: { value: 0 },
    uMode: { value: 0 },
  },
  transparent: true,
  depthWrite: false,
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying vec2 vUv;
    uniform float uTime;
    uniform float uIntensity;
    uniform int uMode;
    vec3 hsv2rgb(vec3 c){
      vec4 K = vec4(1.0, 2.0/3.0, 1.0/3.0, 3.0);
      vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
      return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
    }
    void main() {
      vec2 p = vUv - 0.5;
      float r = length(p);
      float a = atan(p.y, p.x);
      vec3 col = vec3(0.0);
      if (uMode == 1) {
        float k = 6.0;
        float aa = mod(a, 6.2831/k) - 3.1415/k;
        vec2 q = vec2(cos(aa), sin(aa)) * r;
        float v = sin(q.x*22.0 + uTime*2.0) + sin(q.y*18.0 - uTime*1.7);
        col = hsv2rgb(vec3(fract(v*0.12 + uTime*0.08), 0.85, 0.65));
      } else if (uMode == 2) {
        float v = sin(r*28.0 - uTime*1.8);
        col = hsv2rgb(vec3(0.05 + 0.08*sin(uTime*0.5), 0.55, 0.4 + v*0.25));
      } else if (uMode == 3) {
        float v = sin(a*8.0 + uTime*5.0)*0.5 + sin(r*44.0 - uTime*8.0)*0.5;
        col = hsv2rgb(vec3(fract(v*0.4 + uTime*0.35), 1.0, 0.55 + 0.45*v));
      } else if (uMode == 4) {
        float v = sin(a*3.0 + uTime*2.0) * 0.5;
        col = hsv2rgb(vec3(fract(uTime*0.2 + a*0.16), 0.8, 0.5 + 0.5*v));
      } else if (uMode == 5) {
        float k = 8.0;
        float aa = mod(a + uTime * 0.18, 6.2831/k) - 3.1415/k;
        vec2 q = vec2(cos(aa), sin(aa)) * r;
        float v = sin(q.x * 30.0 + uTime * 2.0)
                + sin(q.y * 22.0 - uTime * 1.6)
                + sin((q.x + q.y) * 44.0 - uTime * 2.6) * 0.6;
        float hue = fract(v * 0.14 + uTime * 0.1);
        vec3 rainbow = hsv2rgb(vec3(hue, 0.95, 0.55 + 0.3 * v));
        float core = pow(max(0.0, 1.0 - r * 1.7), 3.5);
        float pulse = 0.45 + 0.55 * sin(uTime * 1.1);
        col = rainbow * (0.85 - core * 0.55) + vec3(core * pulse * 1.4);
      }
      gl_FragColor = vec4(col, uIntensity);
    }
  `,
});
const tripPlane = new THREE.Mesh(new THREE.PlaneGeometry(50, 50), tripMat);
tripPlane.position.z = -8;
scene.add(tripPlane);

const drugs = {
  lsd:        { duration: 28, tripMode: 1 },
  acid:       { duration: 28, tripMode: 1 },
  mushrooms:  { duration: 24, tripMode: 2 },
  shrooms:    { duration: 24, tripMode: 2 },
  psilocybin: { duration: 24, tripMode: 2 },
  dmt:        { duration: 14, tripMode: 3 },
  '5-meo-dmt (toad)': { duration: 14, tripMode: 5 },
  '5-meo-dmt': { duration: 14, tripMode: 5 },
  '5 meo dmt': { duration: 14, tripMode: 5 },
  '5meodmt':   { duration: 14, tripMode: 5 },
  '5meo':      { duration: 14, tripMode: 5 },
  toad:        { duration: 14, tripMode: 5 },
  bufo:        { duration: 14, tripMode: 5 },
  mdma:       { duration: 22, tripMode: 4 },
  ecstasy:    { duration: 22, tripMode: 4 },
  molly:      { duration: 22, tripMode: 4 },
  caffeine:   { duration: 12 },
  coffee:     { duration: 12 },
  cocaine:    { duration: 14 },
  coke:       { duration: 14 },
  weed:       { duration: 20 },
  cannabis:   { duration: 20 },
  marijuana:  { duration: 20 },
  alcohol:    { duration: 18 },
  beer:       { duration: 18 },
  wine:       { duration: 18 },
  ketamine:   { duration: 16 },
  k:          { duration: 16 },
  meth:       { duration: 18 },
  heroin:     { duration: 20 },
  opioid:     { duration: 20 },
  nicotine:   { duration: 8 },
  adderall:   { duration: 14 },
  unknown:    { duration: 12 },
};

const effects = {
  lsd: (t, i) => {
    const hue = (t * 0.1) % 1;
    skin.color.setHSL(hue, 0.55, 0.7);
    skin.emissive.setHSL(hue, 1, 0.22 * i);
    head.scale.setScalar(1 + Math.sin(t * 2) * 0.12 * i);
    avatar.rotation.y = Math.sin(t * 0.7) * 0.55 * i;
    avatar.rotation.z = Math.sin(t * 1.1) * 0.18 * i;
    avatar.position.y = Math.sin(t * 0.6) * 0.1 * i;
  },
  acid: (t, i) => effects.lsd(t, i),
  mushrooms: (t, i) => {
    const breathe = Math.sin(t * 0.9) * 0.16 * i;
    head.scale.setScalar(1 + breathe);
    body.scale.set(1 + breathe * 0.6, 1, 1 + breathe * 0.6);
    avatar.rotation.x = Math.sin(t * 0.4) * 0.12 * i;
    skin.color.setHSL(0.05 + Math.sin(t * 0.3) * 0.06, 0.42, 0.6);
    skin.emissive.setHSL(0.08, 0.4, 0.12 * i);
  },
  shrooms: (t, i) => effects.mushrooms(t, i),
  psilocybin: (t, i) => effects.mushrooms(t, i),
  dmt: (t, i) => {
    const hue = (t * 0.6) % 1;
    skin.emissive.setHSL(hue, 1, 0.45 * i);
    skin.color.setHSL(hue, 0.5, 0.6);
    avatar.position.z = Math.sin(t * 9) * 0.35 * i;
    head.scale.setScalar(1 + Math.sin(t * 14) * 0.18 * i);
    avatar.rotation.y = t * 0.9 * i;
  },
  '5-meo-dmt (toad)': (t, i) => {
    const elapsed = Math.max(0, t - state.startTime);
    const cycleLen = 7;
    const phase = (elapsed % cycleLen) / cycleLen;
    const hue = (t * 0.45) % 1;
    if (phase < 0.5) {
      const p = phase / 0.5;
      const ease = p * p;
      avatar.scale.setScalar(1 + ease * 0.6);
      skin.color.setHSL(hue, 0.7, 0.55 + ease * 0.35);
      skin.emissive.setHSL(hue, 1, 0.5 * ease);
      avatar.rotation.y = ease * Math.PI * 0.4 + t * 0.6;
      leftEye.visible = p < 0.4;
      rightEye.visible = p < 0.4;
    } else if (phase < 0.62) {
      const p = (phase - 0.5) / 0.12;
      const ease = 1 - Math.pow(1 - p, 3);
      avatar.scale.setScalar(1.6 - ease * 1.58);
      skin.color.setHSL(hue, 0.7 - ease * 0.7, 0.9 + ease * 0.1);
      skin.emissive.setHSL(hue, 1 - ease, 0.5 - ease * 0.2);
      leftEye.visible = false;
      rightEye.visible = false;
    } else if (phase < 0.85) {
      avatar.scale.setScalar(0.02);
      skin.color.setHex(0xffffff);
      skin.emissive.setRGB(0.85, 0.82, 0.75);
      leftEye.visible = false;
      rightEye.visible = false;
    } else {
      const p = (phase - 0.85) / 0.15;
      const ease = 1 - Math.pow(1 - p, 4);
      avatar.scale.setScalar(0.02 + ease * 0.98);
      skin.color.setHSL(hue, 0.7 * ease, 0.95 - ease * 0.25);
      skin.emissive.setHSL(hue, 1, 0.55 * (1 - ease * 0.5));
    }
  },
  '5-meo-dmt': (t, i) => effects['5-meo-dmt (toad)'](t, i),
  '5 meo dmt': (t, i) => effects['5-meo-dmt (toad)'](t, i),
  '5meodmt':   (t, i) => effects['5-meo-dmt (toad)'](t, i),
  '5meo':      (t, i) => effects['5-meo-dmt (toad)'](t, i),
  toad:        (t, i) => effects['5-meo-dmt (toad)'](t, i),
  bufo:        (t, i) => effects['5-meo-dmt (toad)'](t, i),
  mdma: (t, i) => {
    const hue = (t * 0.4) % 1;
    skin.color.setHSL(hue, 0.5, 0.7);
    skin.emissive.setHSL(hue, 0.9, 0.28 * i);
    avatar.position.y = Math.abs(Math.sin(t * 3)) * 0.45 * i;
    avatar.rotation.y = Math.sin(t * 2) * 0.35 * i;
    head.scale.setScalar(1 + Math.sin(t * 6) * 0.05 * i);
  },
  ecstasy: (t, i) => effects.mdma(t, i),
  molly: (t, i) => effects.mdma(t, i),
  caffeine: (t, i) => {
    avatar.position.x = (Math.random() - 0.5) * 0.04 * i;
    avatar.position.y = (Math.random() - 0.5) * 0.04 * i;
    head.rotation.y = Math.sin(t * 9) * 0.28 * i;
    body.scale.set(1 + Math.sin(t * 5) * 0.02 * i, 1, 1);
  },
  coffee: (t, i) => effects.caffeine(t, i),
  cocaine: (t, i) => {
    avatar.position.x = (Math.random() - 0.5) * 0.09 * i;
    avatar.position.y = (Math.random() - 0.5) * 0.09 * i;
    head.rotation.y = Math.sin(t * 13) * 0.45 * i;
    skin.emissive.setRGB(0.35 * i, 0.06 * i, 0.06 * i);
  },
  coke: (t, i) => effects.cocaine(t, i),
  weed: (t, i) => {
    avatar.position.y = Math.sin(t * 0.6) * 0.18 * i - 0.18 * i;
    avatar.rotation.z = Math.sin(t * 0.4) * 0.18 * i;
    head.rotation.z = Math.sin(t * 0.5) * 0.22 * i;
    head.rotation.x = 0.15 * i;
    eyeMat.color.setRGB(0.1 + 0.8 * i, 0.05, 0.05);
  },
  cannabis: (t, i) => effects.weed(t, i),
  marijuana: (t, i) => effects.weed(t, i),
  alcohol: (t, i) => {
    const elapsed = Math.max(0, t - state.startTime);
    const cycleLen = 4.5;
    const phase = (elapsed % cycleLen) / cycleLen;
    skin.color.setHSL(0.02, 0.5, 0.65);
    if (phase < 0.25) {
      // wobble (drunken stagger)
      const w = Math.sin(elapsed * 5);
      avatar.rotation.z = w * 0.18;
      avatar.position.x = w * 0.25;
      head.rotation.z = Math.sin(elapsed * 3 + 1) * 0.18;
    } else if (phase < 0.4) {
      // KNOCKED DOWN — tip onto back
      const p = (phase - 0.25) / 0.15;
      const ease = p * p;
      avatar.rotation.x = -Math.PI / 2 * ease;
      avatar.position.y = -ease * 0.3;
      avatar.position.z = -ease * 0.35;
    } else if (phase < 0.65) {
      // lying flat
      avatar.rotation.x = -Math.PI / 2;
      avatar.position.y = -0.3;
      avatar.position.z = -0.35;
    } else if (phase < 0.78) {
      // Neo prep — back arches off the ground
      const p = (phase - 0.65) / 0.13;
      avatar.rotation.x = -Math.PI / 2 + p * (Math.PI / 5);
      avatar.position.y = -0.3 + p * 0.12;
    } else if (phase < 0.92) {
      // SPRING UP! bullet-time kip-up
      const p = (phase - 0.78) / 0.14;
      const ease = 1 - Math.pow(1 - p, 3);
      const startRot = -Math.PI / 2 + Math.PI / 5;
      avatar.rotation.x = startRot * (1 - ease);
      avatar.position.y = -0.18 * (1 - ease) + Math.sin(p * Math.PI) * 0.25;
      avatar.position.z = -0.35 * (1 - ease);
    } else {
      // brief triumph
      const p = (phase - 0.92) / 0.08;
      avatar.rotation.z = Math.sin(p * Math.PI * 6) * 0.06;
    }
  },
  beer: (t, i) => effects.alcohol(t, i),
  wine: (t, i) => effects.alcohol(t, i),
  ketamine: (t, i) => {
    const elapsed = Math.max(0, t - state.startTime);
    const cycleLen = 5.5;
    const phase = (elapsed % cycleLen) / cycleLen;
    if (phase < 0.55) {
      // fold forward and shrink toward a vanishing point
      const p = phase / 0.55;
      const ease = p * p;
      avatar.rotation.x = ease * Math.PI;
      avatar.position.y = -ease * 0.45;
      const s = 1 - ease * 0.97;
      avatar.scale.setScalar(Math.max(s, 0.03));
    } else if (phase < 0.78) {
      // gone
      avatar.scale.setScalar(0.03);
      avatar.rotation.x = Math.PI;
      avatar.position.y = -0.45;
    } else {
      // pop back upright
      const p = (phase - 0.78) / 0.22;
      const ease = 1 - Math.pow(1 - p, 4);
      avatar.scale.setScalar(0.03 + ease * 0.97);
      avatar.rotation.x = Math.PI * (1 - ease);
      avatar.position.y = -0.45 * (1 - ease);
    }
    skin.color.setHSL(0.6, 0.1, 0.55);
  },
  k: (t, i) => effects.ketamine(t, i),
  meth: (t, i) => {
    avatar.position.x = (Math.random() - 0.5) * 0.14 * i;
    avatar.position.y = (Math.random() - 0.5) * 0.14 * i;
    head.scale.setScalar(1 + Math.sin(t * 18) * 0.12 * i);
    skin.emissive.setRGB(0.45 * i, 0.22 * i, 0);
    head.rotation.y = Math.sin(t * 20) * 0.3 * i;
  },
  heroin: (t, i) => {
    avatar.position.y = -0.55 * i;
    avatar.rotation.z = 0.22 * i;
    head.rotation.x = 0.45 * i;
    head.rotation.z = -0.15 * i;
    skin.color.setHSL(0.6, 0.05, 0.6 - 0.25 * i);
  },
  opioid: (t, i) => effects.heroin(t, i),
  nicotine: (t, i) => {
    avatar.position.y = Math.sin(t * 4) * 0.02 * i;
    head.rotation.y = Math.sin(t * 0.5) * 0.12 * i;
    skin.emissive.setRGB(0.05 * i, 0.05 * i, 0.05 * i);
  },
  adderall: (t, i) => {
    avatar.position.x = Math.sin(t * 6) * 0.05 * i;
    head.rotation.y = Math.sin(t * 4) * 0.18 * i;
    skin.emissive.setRGB(0.2 * i, 0.15 * i, 0.05 * i);
  },
  unknown: (t, i) => {
    head.rotation.y = Math.sin(t * 2.5) * 0.4 * i;
    avatar.position.y = Math.sin(t * 3) * 0.06 * i;
    avatar.rotation.z = Math.sin(t * 1.7) * 0.1 * i;
    skin.color.setHSL((t * 0.5) % 1, 0.3, 0.5);
  },
};

const audio = new Audio();
audio.preload = 'none';
audio.volume = 0.7;
playBtn.addEventListener('click', () => {
  if (!audio.src) return;
  if (audio.paused) audio.play().catch(() => {});
  else audio.pause();
});
audio.addEventListener('play', () => { playBtn.textContent = '⏸'; });
audio.addEventListener('pause', () => { playBtn.textContent = '▶'; });
audio.addEventListener('ended', () => { playBtn.textContent = '▶'; });

function loadTrack(key) {
  const t = tracks[key];
  if (!t || !t.preview) { clearTrack(); return; }
  titleEl.textContent = t.title;
  artistEl.textContent = t.artist;
  if (t.art) artEl.src = t.art;
  else artEl.removeAttribute('src');
  audio.src = t.preview;
  audio.currentTime = 0;
  playBtn.disabled = false;
  audio.play().catch(() => {});
}
function clearTrack() {
  audio.pause();
  audio.removeAttribute('src');
  audio.load();
  titleEl.textContent = '—';
  artistEl.textContent = 'No track';
  artEl.removeAttribute('src');
  playBtn.disabled = true;
  playBtn.textContent = '▶';
}

function ingest(rawName) {
  const name = rawName.trim();
  if (!name) return;
  const key = name.toLowerCase();
  const known = drugs[key];
  const cfg = known || drugs.unknown;
  state.mode = known ? key : 'unknown';
  state.label = name.toUpperCase();
  state.startTime = performance.now() / 1000;
  state.duration = cfg.duration;
  state.tripMode = cfg.tripMode || 0;
  tripMat.uniforms.uMode.value = state.tripMode;
  statusEl.textContent = `ON ${state.label}`;
  setActiveMenu(state.mode);
  loadTrack(state.mode);
}

ingestBtn.addEventListener('click', () => ingest(drugInput.value || drugInput.placeholder));
drugInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') ingest(drugInput.value || drugInput.placeholder);
});

const menuEl = document.getElementById('menu');
const menuButtons = new Map();
function addMenuChip(label, key) {
  const btn = document.createElement('button');
  btn.className = 'menu-item';
  btn.textContent = label;
  btn.dataset.key = key;
  btn.addEventListener('click', () => {
    drugInput.value = label;
    ingest(label);
  });
  menuEl.appendChild(btn);
  menuButtons.set(key, btn);
}

  ['METH', 'meth'], ['HEROIN', 'heroin'],
];
menuItems.forEach(([label, key]) => addMenuChip(label, key));

function setActiveMenu(key) {
  menuButtons.forEach((btn, k) => btn.classList.toggle('active', k === key));
}

    avatar.position.y = Math.sin(t * 1.5) * 0.3 * i;
    avatar.rotation.y = Math.sin(t * 0.6) * 0.4 * i;
    head.scale.setScalar(1 + Math.sin(t * 2) * 0.05 * i);
  },
  wobble: (t, i) => {
    avatar.rotation.z = Math.sin(t * 5) * 0.18 * i;
    avatar.position.x = Math.sin(t * 5) * 0.22 * i;
    head.rotation.z = Math.sin(t * 3 + 1) * 0.18 * i;
  },
  pulse: (t, i) => {
    const p = Math.sin(t * 6) * 0.18 * i;
    head.scale.setScalar(1 + p);
    body.scale.set(1 + p * 0.25, 1, 1 + p * 0.25);
  },
  fragment: (t, i) => {
    avatar.position.x = (Math.random() - 0.5) * 0.2 * i;
    avatar.position.y = (Math.random() - 0.5) * 0.2 * i;
    avatar.position.z = (Math.random() - 0.5) * 0.2 * i;
    head.rotation.y = (Math.random() - 0.5) * 0.5 * i;
  },
  jitter: (t, i) => {
    avatar.position.x = (Math.random() - 0.5) * 0.06 * i;
    avatar.position.y = (Math.random() - 0.5) * 0.06 * i;
    head.rotation.y = Math.sin(t * 14) * 0.3 * i;
    body.scale.set(1 + Math.sin(t * 8) * 0.03 * i, 1, 1);
  },
  slump: (t, i) => {
    head.rotation.x = 0.4 * i;
    head.rotation.z = -0.12 * i;
    avatar.position.y = -0.4 * i;
    avatar.rotation.z = 0.18 * i;
  },
  breathe: (t, i) => {
    const b = Math.sin(t * 0.9) * 0.16 * i;
    head.scale.setScalar(1 + b);
    body.scale.set(1 + b * 0.6, 1, 1 + b * 0.6);
    avatar.rotation.x = Math.sin(t * 0.4) * 0.08 * i;
  },
  spin: (t, i) => {
    avatar.rotation.y = t * 1.6 * i;
    avatar.position.y = Math.sin(t * 2) * 0.1 * i;
  },
  kipup: (t, i) => effects.alcohol(t, i),
  vanish: (t, i) => effects.ketamine(t, i),
};

const palettes = {
  none: () => {},
  rainbow: (t, i) => {
    const hue = (t * 0.2) % 1;
    skin.color.setHSL(hue, 0.6, 0.65);
    skin.emissive.setHSL(hue, 0.9, 0.22 * i);
  },
  warm: (t, i) => {
    const h = 0.03 + Math.sin(t * 0.5) * 0.04;
    skin.color.setHSL(h, 0.7, 0.6);
    skin.emissive.setHSL(0.05, 0.9, 0.22 * i);
  },
  cool: (t, i) => {
    const h = 0.6 + Math.sin(t * 0.5) * 0.06;
    skin.color.setHSL(h, 0.55, 0.6);
    skin.emissive.setHSL(0.66, 0.8, 0.18 * i);
  },
  neon: (t, i) => {
    const hue = (t * 0.6) % 1;
    skin.color.setHSL(hue, 1.0, 0.55);
    skin.emissive.setHSL(hue, 1.0, 0.45 * i);
  },
  monochrome: (t, i) => {
    skin.color.setHSL(0, 0, 0.55 - 0.25 * i);
    skin.emissive.setHex(0x000000);
  },
};

function buildEffect(cfg) {
  const motion = motions[cfg.motion] || motions.float;
  const palette = palettes[cfg.palette] || palettes.none;
  const k = cfg.intensity;
  return (t, i) => {
    const ii = i * k;
    palette(t, ii);
    motion(t, ii);
  };
}

function openModal() {
  modal.classList.add('open');
  mStatus.textContent = '';
  mStatus.classList.remove('error');
  setTimeout(() => mName.focus(), 50);
}
function closeModal() { modal.classList.remove('open'); }

inventBtn.addEventListener('click', openModal);
mCancel.addEventListener('click', closeModal);
modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && modal.classList.contains('open')) closeModal();
});

async function searchITunes(q) {
  try {
    const url = `https://itunes.apple.com/search?term=${encodeURIComponent(q)}&entity=song&limit=1&country=us`;
    const res = await fetch(url);
    const data = await res.json();
    const r = data.results && data.results[0];
    if (!r || !r.previewUrl) return null;
    return { title: r.trackName, artist: r.artistName, preview: r.previewUrl, art: r.artworkUrl100 };
  } catch { return null; }
}

mSubmit.addEventListener('click', async () => {
  const name = mName.value.trim();
  if (!name) {
    mStatus.textContent = 'NAME REQUIRED';
    mStatus.classList.add('error');
    return;
  }
  mStatus.classList.remove('error');
  const songQuery = mSong.value.trim();
  let track = null;
  if (songQuery) {
    mStatus.textContent = 'SEARCHING SONG…';
    mSubmit.disabled = true;
    track = await searchITunes(songQuery);
    mSubmit.disabled = false;
    if (!track) {
      mStatus.textContent = 'SONG NOT FOUND — CREATING WITHOUT';
      mStatus.classList.add('error');
    }
  }
  const key = name.toLowerCase().replace(/[^a-z0-9]+/g, '');
  if (!key) {
    mStatus.textContent = 'INVALID NAME';
    mStatus.classList.add('error');
    return;
  }
  const cfg = {
    intensity: parseFloat(mIntensity.value),
    motion: mMotion.value,
    palette: mPalette.value,
  };
  const duration = parseInt(mDuration.value, 10);
  const tripMode = parseInt(mShader.value, 10);
  drugs[key] = { duration, tripMode };
  effects[key] = buildEffect(cfg);
  if (track) tracks[key] = track;
  if (!menuButtons.has(key)) addMenuChip(name.toUpperCase(), key);
  closeModal();
  mName.value = '';
  mSong.value = '';
  mStatus.textContent = '';
  drugInput.value = name;
  ingest(name);
});

function resize() {
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  if (!w || !h) return;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
requestAnimationFrame(resize);

function tick() {
  requestAnimationFrame(tick);
  const t = performance.now() / 1000;
  const elapsed = state.mode !== 'sober' ? t - state.startTime : 0;
  const progress = state.duration ? Math.min(elapsed / state.duration, 1) : 0;
  const ramp = progress < 0.2 ? progress / 0.2 : 1 - (progress - 0.2) / 0.8;
  const intensity = Math.max(0, ramp);

  head.position.set(0, 2, 0);
  body.position.set(0, 0.5, 0);
  head.scale.set(1, 1, 1);
  body.scale.set(1, 1, 1);
  head.rotation.set(0, 0, 0);
  body.rotation.set(0, 0, 0);
  avatar.rotation.set(0, 0, 0);
  avatar.position.set(0, 0, 0);
  avatar.scale.set(1, 1, 1);
  leftEye.visible = true;
  rightEye.visible = true;
  skin.color.setHex(0xeeeeee);
  skin.emissive.setHex(0x000000);
  eyeMat.color.setHex(0x111111);

  const idle = Math.sin(t * 1.2) * 0.015;
  body.scale.set(1 + idle, 1 - idle * 0.3, 1 + idle);
  head.position.y = 2 + idle * 0.4;

  tripMat.uniforms.uTime.value = t;
  tripMat.uniforms.uIntensity.value = state.tripMode ? intensity * 0.9 : 0;

  const effect = effects[state.mode];
  if (effect && intensity > 0) effect(t, intensity);

  barEl.style.width = `${progress * 100}%`;

  if (progress >= 1 && state.mode !== 'sober') {
    state.mode = 'sober';
    state.tripMode = 0;
    tripMat.uniforms.uMode.value = 0;
    statusEl.textContent = 'SOBER';
    setActiveMenu(null);
    clearTrack();
  }

  renderer.render(scene, camera);
}
tick();
</script>
