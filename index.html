<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BATTLE OF BELIEFS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Bebas+Neue&family=Special+Elite&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #f7e9c9;
    --paper: #fff7df;
    --crimson: #c8102e;
    --gold: #d6a737;
    --shadow: rgba(0,0,0,0.55);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: #050505;
    color: var(--ink);
    font-family: 'Bebas Neue', system-ui, sans-serif;
    user-select: none;
  }
  canvas#stage {
    position: fixed; inset: 0;
    width: 100vw; height: 100vh;
    display: block;
    pointer-events: none; /* never block UI; 3D scene is presentational */
    z-index: 1;
  }
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 22px 28px 14px;
    z-index: 30;
    background: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent);
    pointer-events: auto;
  }
  #title {
    font-family: 'Bungee', sans-serif;
    font-size: clamp(34px, 5.2vw, 70px);
    letter-spacing: 0.06em;
    color: var(--gold);
    text-shadow:
      2px 2px 0 #6b0e1c,
      4px 4px 0 #2a0509,
      0 0 30px rgba(214,167,55,0.4);
    line-height: 1;
    text-align: center;
  }
  #title small {
    display: block;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.22em;
    letter-spacing: 0.5em;
    color: #fff;
    margin-top: 4px;
    text-shadow: 1px 1px 0 #000;
  }
  #matchmake {
    margin: 16px auto 0;
    max-width: 1100px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
    pointer-events: auto;
  }
  .mm-label {
    font-family: 'Bungee', sans-serif;
    font-size: clamp(18px, 1.8vw, 26px);
    letter-spacing: 0.12em;
    color: var(--ink);
    padding: 6px 12px;
    background: var(--crimson);
    border: 2px solid #ffd76b;
    box-shadow: 3px 3px 0 #000;
  }
  select.fighter-pick {
    appearance: none;
    -webkit-appearance: none;
    background: var(--paper);
    color: #1a1a1a;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(18px, 1.7vw, 24px);
    letter-spacing: 0.08em;
    padding: 10px 38px 10px 16px;
    border: 3px solid #000;
    box-shadow: 4px 4px 0 #000, inset 0 -3px 0 #d6c290;
    cursor: pointer;
    min-width: 240px;
    background-image: linear-gradient(45deg, transparent 50%, #000 50%), linear-gradient(135deg, #000 50%, transparent 50%);
    background-position: calc(100% - 16px) 50%, calc(100% - 10px) 50%;
    background-size: 6px 6px;
    background-repeat: no-repeat;
  }
  select.fighter-pick:focus { outline: 3px solid var(--gold); outline-offset: 2px; }
  .vs-pill {
    font-family: 'Bungee', sans-serif;
    color: #fff;
    background: #111;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 18px;
    letter-spacing: 0.18em;
    border: 2px solid var(--gold);
  }
  #ringbell {
    font-family: 'Bungee', sans-serif;
    font-size: clamp(20px, 2vw, 28px);
    letter-spacing: 0.14em;
    background: var(--gold);
    color: #1a0a02;
    padding: 10px 24px 10px 18px;
    border: 3px solid #000;
    box-shadow: 5px 5px 0 #000;
    cursor: pointer;
    transition: transform 0.06s, box-shadow 0.06s, filter 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 12px;
  }
  #ringbell:hover { filter: brightness(1.08); }
  #ringbell:hover .bell-svg { animation: shake 0.5s ease-in-out; transform-origin: 50% 6%; }
  #ringbell:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0 #000; }
  #ringbell:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: 5px 5px 0 #000; }
  #ringbell .bell-svg {
    width: clamp(28px, 2.6vw, 38px);
    height: clamp(28px, 2.6vw, 38px);
    flex: 0 0 auto;
    filter: drop-shadow(1px 1px 0 #5a3a0a);
  }
  @keyframes shake {
    0%, 100% { transform: rotate(0); }
    20% { transform: rotate(-22deg); }
    40% { transform: rotate(18deg); }
    60% { transform: rotate(-14deg); }
    80% { transform: rotate(10deg); }
  }

  #round-info {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Bungee', sans-serif;
    font-size: clamp(60px, 14vw, 220px);
    color: #fff;
    text-shadow: 4px 4px 0 #c8102e, 8px 8px 0 #000;
    pointer-events: none;
    opacity: 0;
    z-index: 30;
    letter-spacing: 0.04em;
  }
  #round-info.show {
    animation: pop 1.2s ease-out forwards;
  }
  @keyframes pop {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
    20% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
    70% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
  }

  #timer {
    position: fixed;
    top: 18px;
    right: 22px;
    font-family: 'Bungee', sans-serif;
    font-size: 42px;
    color: var(--gold);
    background: #111;
    padding: 4px 18px;
    border: 3px solid var(--gold);
    box-shadow: 3px 3px 0 #000;
    z-index: 25;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #timer.show { opacity: 1; }

  #fighter-tags {
    position: fixed;
    bottom: 24px;
    left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 36px;
    z-index: 20;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s;
  }
  #fighter-tags.show { opacity: 1; }
  .fighter-tag {
    background: #111;
    border: 3px solid var(--gold);
    padding: 10px 18px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(18px, 2vw, 28px);
    letter-spacing: 0.1em;
    color: var(--ink);
    box-shadow: 4px 4px 0 #000;
    max-width: 38vw;
  }
  .fighter-tag.left { border-left: 12px solid #2b6cb0; }
  .fighter-tag.right { border-right: 12px solid #c8102e; }
  .fighter-tag .corner { display: block; font-size: 0.55em; color: var(--gold); letter-spacing: 0.3em; }

  #notecard-wrap {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 40;
    opacity: 0;
    transition: opacity 0.5s;
  }
  #notecard-wrap.show { opacity: 1; }
  #notecard {
    width: min(720px, 86vw);
    background: var(--paper);
    color: #1a1a1a;
    padding: 36px 44px 44px;
    font-family: 'Special Elite', 'Courier New', monospace;
    box-shadow: 12px 14px 0 rgba(0,0,0,0.7);
    border: 3px solid #1a1a1a;
    transform: translateY(180px) rotate(-1.4deg);
    transition: transform 0.6s cubic-bezier(.22,1.3,.36,1);
    position: relative;
  }
  #notecard-wrap.show #notecard {
    transform: translateY(0) rotate(-1.4deg);
  }
  #notecard::before {
    content: '';
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 18px;
    background: var(--crimson);
    box-shadow: 0 2px 0 rgba(0,0,0,0.4);
    border: 2px solid #1a1a1a;
  }
  #notecard h2 {
    font-family: 'Bungee', sans-serif;
    font-size: clamp(20px, 2.2vw, 28px);
    letter-spacing: 0.08em;
    color: var(--crimson);
    margin-bottom: 6px;
  }
  #notecard .winner-line {
    font-family: 'Bungee', sans-serif;
    font-size: clamp(24px, 3vw, 40px);
    color: #1a1a1a;
    margin-bottom: 18px;
    line-height: 1.05;
  }
  #notecard .move-line {
    font-size: clamp(14px, 1.4vw, 18px);
    color: #8a3a13;
    margin-bottom: 14px;
    font-weight: 700;
  }
  #notecard .quip {
    font-size: clamp(16px, 1.6vw, 22px);
    line-height: 1.45;
    border-top: 2px dashed #888;
    padding-top: 14px;
    color: #1a1a1a;
  }
  #notecard .fineprint {
    margin-top: 16px;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: #777;
    text-transform: uppercase;
  }
  #replay {
    position: fixed;
    bottom: 38px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s;
    font-family: 'Bungee', sans-serif;
    background: var(--gold);
    color: #1a0a02;
    padding: 10px 22px;
    border: 3px solid #000;
    box-shadow: 4px 4px 0 #000;
    cursor: pointer;
    letter-spacing: 0.14em;
  }
  #replay.show { opacity: 1; pointer-events: auto; }

  .credit {
    position: fixed;
    bottom: 8px;
    right: 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: #555;
    z-index: 60;
  }
</style>
</head>

</div>

<div id="timer">30</div>

</div>

<div id="notecard-wrap">
  <div id="notecard">
    <h2>OFFICIAL RULING</h2>
    <div class="winner-line" id="nc-winner"></div>

    <div class="quip" id="nc-quip"></div>

</div>

<button id="replay">REMATCH ANY TIME</button>

/* ----- Boxing Ring ----- */
function buildRing() {
  const ringGroup = new THREE.Group();

  // Apron (skirted base under the mat)
  const apron = new THREE.Mesh(
    new THREE.BoxGeometry(9, 1.0, 9),
    new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 })
  );
  apron.position.y = -0.5;
  apron.receiveShadow = true;
  apron.castShadow = true;
  ringGroup.add(apron);

  // Apron stripe (gold trim)
  const apronTrim = new THREE.Mesh(
    new THREE.BoxGeometry(9.05, 0.15, 9.05),
    new THREE.MeshStandardMaterial({ color: 0xd6a737, roughness: 0.5, metalness: 0.4 })
  );
  apronTrim.position.y = -0.85;
  ringGroup.add(apronTrim);

  // Mat (canvas) — slight off-white
  const mat = new THREE.Mesh(
    new THREE.BoxGeometry(8, 0.05, 8),
    new THREE.MeshStandardMaterial({ color: 0xe8d8ad, roughness: 0.95 })
  );
  mat.position.y = 0.02;
  mat.receiveShadow = true;
  ringGroup.add(mat);

  // Center logo (a stylized B)
  const logoCanvas = document.createElement('canvas');
  logoCanvas.width = 512; logoCanvas.height = 512;
  const ctx2d = logoCanvas.getContext('2d');
  ctx2d.fillStyle = '#e8d8ad';
  ctx2d.fillRect(0, 0, 512, 512);
  ctx2d.strokeStyle = '#7a1a26';
  ctx2d.lineWidth = 8;
  ctx2d.strokeRect(14, 14, 484, 484);
  ctx2d.fillStyle = '#7a1a26';
  ctx2d.font = 'bold 200px sans-serif';
  ctx2d.textAlign = 'center';
  ctx2d.textBaseline = 'middle';
  ctx2d.fillText('BoB', 256, 256);
  ctx2d.font = 'bold 38px sans-serif';
  ctx2d.fillText('BATTLE OF BELIEFS', 256, 410);
  const logoTex = new THREE.CanvasTexture(logoCanvas);
  const logo = new THREE.Mesh(
    new THREE.PlaneGeometry(4.2, 4.2),
    new THREE.MeshStandardMaterial({ map: logoTex, transparent: false, roughness: 0.9 })
  );
  logo.rotation.x = -Math.PI / 2;
  logo.position.y = 0.06;
  ringGroup.add(logo);

  // 4 corner posts
  const postPositions = [
    [-3.95, 0, -3.95],
    [ 3.95, 0, -3.95],
    [-3.95, 0,  3.95],
    [ 3.95, 0,  3.95],
  ];
  const postColors = [0xc8102e, 0xc8102e, 0x2b6cb0, 0x2b6cb0]; // red corners back, blue corners front
  postPositions.forEach((p, i) => {
    const post = new THREE.Mesh(
      new THREE.CylinderGeometry(0.14, 0.16, 2.6, 16),
      new THREE.MeshStandardMaterial({ color: postColors[i], roughness: 0.5, metalness: 0.2 })
    );
    post.position.set(p[0], 1.3, p[2]);
    post.castShadow = true;
    ringGroup.add(post);

    // Padded turnbuckle
    const pad = new THREE.Mesh(
      new THREE.BoxGeometry(0.6, 0.5, 0.6),
      new THREE.MeshStandardMaterial({ color: postColors[i], roughness: 0.8 })
    );
    pad.position.set(p[0], 2.0, p[2]);
    ringGroup.add(pad);

    const cap = new THREE.Mesh(
      new THREE.SphereGeometry(0.18, 16, 12),
      new THREE.MeshStandardMaterial({ color: 0xd6a737, roughness: 0.3, metalness: 0.6 })
    );
    cap.position.set(p[0], 2.7, p[2]);
    ringGroup.add(cap);
  });

  // Ropes — three levels, four sides, two colors alternating
  const ropeColors = [0xc8102e, 0xffffff, 0x2b6cb0];
  const ropeHeights = [0.7, 1.3, 1.9];
  ropeHeights.forEach((h, idx) => {
    const c = ropeColors[idx];
    // 4 sides
    const sides = [
      { len: 7.9, axis: 'x', pos: [0, h,  3.95] }, // front
      { len: 7.9, axis: 'x', pos: [0, h, -3.95] }, // back
      { len: 7.9, axis: 'z', pos: [-3.95, h, 0] }, // left
      { len: 7.9, axis: 'z', pos: [ 3.95, h, 0] }, // right
    ];
    sides.forEach(s => {
      const rope = new THREE.Mesh(
        new THREE.CylinderGeometry(0.04, 0.04, s.len, 8),
        new THREE.MeshStandardMaterial({ color: c, roughness: 0.6 })
      );
      if (s.axis === 'x') rope.rotation.z = Math.PI / 2;
      else rope.rotation.x = Math.PI / 2;
      rope.position.set(...s.pos);
      ringGroup.add(rope);
    });
  });

  scene.add(ringGroup);
  return ringGroup;
}
buildRing();

/* ----- Brass Bell (the literal ringside bell) ----- */
let brassBell = null;
function buildBrassBell() {
  const root = new THREE.Group();

  // Vertical extension rising from corner-post top
  const ext = box(0.08, 0.7, 0.08, 0x3a2410, { rough: 0.85 });
  ext.position.set(0, 0.35, 0);
  root.add(ext);

  // Horizontal arm extending in +z (toward camera) so the bell hangs in the foreground
  const arm = box(0.08, 0.08, 0.8, 0x3a2410, { rough: 0.85 });
  arm.position.set(0, 0.7, 0.4);
  root.add(arm);

  // Tiny mounting pad at end of arm
  const pad = box(0.16, 0.06, 0.16, 0x6a4a10, { metal: 0.6, rough: 0.5 });
  pad.position.set(0, 0.7, 0.8);
  root.add(pad);

  // Two hanging chains (more authentic than a single chain)
  const chain1 = cyl(0.018, 0.018, 0.35, 0x222222, { metal: 0.6, rough: 0.4 });
  chain1.position.set(-0.04, 0.5, 0.8);
  root.add(chain1);
  const chain2 = cyl(0.018, 0.018, 0.35, 0x222222, { metal: 0.6, rough: 0.4 });
  chain2.position.set(0.04, 0.5, 0.8);
  root.add(chain2);

  // ----- Pivot (the bell itself; rotates around its top when struck) -----
  const pivot = new THREE.Group();
  pivot.position.set(0, 0.3, 0.8);
  root.add(pivot);

  // Yoke / crown cap
  const yoke = cyl(0.08, 0.16, 0.1, 0xa8761e, { metal: 0.95, rough: 0.18 });
  yoke.position.y = -0.02;
  pivot.add(yoke);

  // Bell body — truncated cone, brass
  const bellGeo = new THREE.CylinderGeometry(0.18, 0.42, 0.6, 28, 4, true);
  const bellMat = new THREE.MeshStandardMaterial({
    color: 0xe2b54a, metalness: 0.95, roughness: 0.18, side: THREE.DoubleSide,
  });
  const body = new THREE.Mesh(bellGeo, bellMat);
  body.position.y = -0.36;
  body.castShadow = true;
  pivot.add(body);

  // Decorative bands
  const band1 = new THREE.Mesh(
    new THREE.TorusGeometry(0.24, 0.022, 8, 28),
    new THREE.MeshStandardMaterial({ color: 0x6a4a10, metalness: 0.85, roughness: 0.35 })
  );
  band1.rotation.x = Math.PI / 2;
  band1.position.y = -0.18;
  pivot.add(band1);

  const band2 = new THREE.Mesh(
    new THREE.TorusGeometry(0.36, 0.025, 8, 28),
    new THREE.MeshStandardMaterial({ color: 0x6a4a10, metalness: 0.85, roughness: 0.35 })
  );
  band2.rotation.x = Math.PI / 2;
  band2.position.y = -0.5;
  pivot.add(band2);

  // Flared bottom rim
  const rim = new THREE.Mesh(
    new THREE.TorusGeometry(0.42, 0.04, 10, 32),
    new THREE.MeshStandardMaterial({ color: 0xb8861a, metalness: 0.95, roughness: 0.22 })
  );
  rim.rotation.x = Math.PI / 2;
  rim.position.y = -0.66;
  pivot.add(rim);

  // Shadow disc inside the bell mouth (dark interior)
  const inside = new THREE.Mesh(
    new THREE.CircleGeometry(0.38, 24),
    new THREE.MeshStandardMaterial({ color: 0x1a0a02, roughness: 1, side: THREE.DoubleSide })
  );
  inside.rotation.x = Math.PI / 2;
  inside.position.y = -0.64;
  pivot.add(inside);

  // Clapper rope and ball (will be visible peeking out the mouth)
  const clapperRope = cyl(0.01, 0.01, 0.55, 0x111111);
  clapperRope.position.y = -0.36;
  pivot.add(clapperRope);

  const clapperBall = sphere(0.09, 0x3a2a10, { metal: 0.7, rough: 0.4 });
  clapperBall.position.y = -0.64;
  pivot.add(clapperBall);

  // Position root at top of front-right blue corner post
  root.position.set(3.95, 2.6, 3.95);

  scene.add(root);
  return { root, pivot, clapperBall };
}
brassBell = buildBrassBell();

/* ----- Audience ----- */
function buildAudience() {
  const audience = new THREE.Group();
  const headGeo = new THREE.SphereGeometry(0.22, 8, 6);
  const palette = [0xa05a3a, 0x8b6e4e, 0xd9b58a, 0x6a4a35, 0xf2cfa6, 0x4a3525];
  // ring of seats
  for (let ring = 0; ring < 5; ring++) {
    const radius = 8 + ring * 1.4;
    const count = 24 + ring * 8;
    const y = -0.4 + ring * 0.35;
    for (let i = 0; i < count; i++) {
      const a = (i / count) * Math.PI * 2 + ring * 0.13;
      const x = Math.cos(a) * radius;
      const z = Math.sin(a) * radius;
      const head = new THREE.Mesh(
        headGeo,
        new THREE.MeshStandardMaterial({
          color: palette[Math.floor(Math.random() * palette.length)],
          roughness: 0.9,
        })
      );
      head.position.set(x, y, z);
      head.userData.basePhase = Math.random() * Math.PI * 2;
      head.userData.baseY = y;
      audience.add(head);
    }
  }
  scene.add(audience);
  return audience;
}
const audience = buildAudience();

function box(w, h, d, color, opts = {}) {
  const mat = new THREE.MeshStandardMaterial({
    color, roughness: opts.rough ?? 0.7, metalness: opts.metal ?? 0.05,
    transparent: opts.transparent || false, opacity: opts.opacity ?? 1,
  });
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.castShadow = true;
  return m;
}
function sphere(r, color, opts = {}) {
  const mat = new THREE.MeshStandardMaterial({
    color, roughness: opts.rough ?? 0.7, metalness: opts.metal ?? 0.05,
  });
  const m = new THREE.Mesh(new THREE.SphereGeometry(r, 16, 12), mat);
  m.castShadow = true;
  return m;
}
function cyl(rt, rb, h, color, opts = {}) {
  const mat = new THREE.MeshStandardMaterial({
    color, roughness: opts.rough ?? 0.7, metalness: opts.metal ?? 0.05,
  });
  const m = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, 16), mat);
  m.castShadow = true;
  return m;
}

function buildFighter(belief, side /* -1 left, +1 right */) {
  const def = FIGHTERS[belief];
  const group = new THREE.Group();

  // Hip pivot (root)
  const hips = box(0.5, 0.14, 0.32, def.shorts);
  hips.position.y = 1.1;
  group.add(hips);

  // Trunks (waist line)
  const waist = box(0.56, 0.18, 0.36, def.shorts);
  waist.position.y = 0.95;
  group.add(waist);

  // Legs
  function makeLeg(xOffset) {
    const leg = new THREE.Group();
    const thigh = box(0.18, 0.45, 0.18, def.shorts);
    thigh.position.y = -0.22;
    leg.add(thigh);
    const knee = sphere(0.1, def.skin);
    knee.position.y = -0.45;
    leg.add(knee);
    const shin = box(0.16, 0.45, 0.16, def.skin);
    shin.position.y = -0.7;
    leg.add(shin);
    const boot = box(0.22, 0.16, 0.34, 0x111111, { rough: 0.6 });
    boot.position.set(0, -0.96, 0.04);
    leg.add(boot);
    leg.position.set(xOffset, 0.85, 0);
    group.add(leg);
    return leg;
  }
  const legL = makeLeg(-0.13);
  const legR = makeLeg(0.13);

  // Torso
  const torso = box(0.62, 0.7, 0.4, def.robe);
  torso.position.y = 1.5;
  group.add(torso);

  // Trim line at top of trunks
  const trimLine = box(0.66, 0.04, 0.42, def.accent, { metal: 0.3 });
  trimLine.position.y = 1.17;
  group.add(trimLine);

  // Emblem on chest
  const emblem = buildEmblem(def.emblem, def.accent);
  emblem.position.y = 1.5;
  group.add(emblem);

  // Neck
  const neck = cyl(0.09, 0.1, 0.14, def.skin);
  neck.position.y = 1.92;
  group.add(neck);

  // Head
  const headGroup = new THREE.Group();
  headGroup.position.y = 2.15;
  group.add(headGroup);

  const head = box(0.44, 0.46, 0.4, def.skin);
  headGroup.add(head);

  // Eyes
  const eyeL = sphere(0.05, 0xffffff);
  eyeL.position.set(-0.1, 0.05, 0.21);
  headGroup.add(eyeL);
  const eyeR = sphere(0.05, 0xffffff);
  eyeR.position.set(0.1, 0.05, 0.21);
  headGroup.add(eyeR);
  const pupilL = sphere(0.025, 0x111111);
  pupilL.position.set(-0.1, 0.05, 0.245);
  headGroup.add(pupilL);
  const pupilR = sphere(0.025, 0x111111);
  pupilR.position.set(0.1, 0.05, 0.245);
  headGroup.add(pupilR);

  // Mouth
  const mouth = box(0.18, 0.025, 0.02, 0x4a2418);
  mouth.position.set(0, -0.13, 0.22);
  headGroup.add(mouth);

  // Facial features
  const facial = buildFacial(def.facial);
  headGroup.add(facial);

  // Head prop
  const headProp = buildHeadProp(def.head, def.robe, def.accent);
  headProp.position.y = 0.3;
  headGroup.add(headProp);

  // Arms — these are pivoted at the shoulder for animation
  function makeArm(xOffset) {
    const arm = new THREE.Group();
    arm.position.set(xOffset, 1.78, 0);

    const upper = box(0.18, 0.42, 0.18, def.robe);
    upper.position.y = -0.21;
    arm.add(upper);

    const elbow = sphere(0.11, def.skin);
    elbow.position.y = -0.42;
    arm.add(elbow);

    const forearm = box(0.16, 0.38, 0.16, def.skin);
    forearm.position.y = -0.62;
    arm.add(forearm);

    const glove = sphere(0.18, 0xc8102e, { rough: 0.6 });
    glove.position.y = -0.86;
    arm.add(glove);

    return arm;
  }
  const armL = makeArm(-0.4);
  const armR = makeArm(0.4);
  group.add(armL);
  group.add(armR);

  // Place + face center
  group.position.set(side * 1.8, 0, 0);
  group.rotation.y = side > 0 ? -Math.PI / 2 : Math.PI / 2;

  return {
    group, hips, torso, headGroup, armL, armR, legL, legR,
    side, belief,
    // Animation state
    state: 'idle',
    stateTimer: 0,
    hp: 100,
    bobPhase: Math.random() * Math.PI * 2,
    facing: side > 0 ? -Math.PI / 2 : Math.PI / 2,
  };
}

  const foL = box(0.1, 0.4, 0.1, 0xf2cfa6);
  foL.position.y = -0.6;
  armL.add(foL);
  g.add(armL);

  const armR = new THREE.Group();
  armR.position.set(0.24, 1.78, 0);
  const upR = box(0.12, 0.42, 0.12, 0xf2cfa6);
  upR.position.y = -0.21;
  armR.add(upR);
  const foR = box(0.1, 0.4, 0.1, 0xf2cfa6);
  foR.position.y = -0.6;
  armR.add(foR);
  g.add(armR);

  // Card (held above head when raised)
  const card = new THREE.Group();
  const cardBack = box(1.4, 0.96, 0.06, 0xfff7df);
  card.add(cardBack);
  const cardBorder = box(1.42, 0.04, 0.08, 0xc8102e);
  cardBorder.position.y = 0.48;
  card.add(cardBorder);
  // "1" or text would be on a canvas texture; here we just show a stylized card
  const cardCanvas = document.createElement('canvas');
  cardCanvas.width = 512; cardCanvas.height = 360;
  const cctx = cardCanvas.getContext('2d');
  cctx.fillStyle = '#fff7df';
  cctx.fillRect(0, 0, 512, 360);
  cctx.strokeStyle = '#1a1a1a';
  cctx.lineWidth = 8;
  cctx.strokeRect(8, 8, 496, 344);
  cctx.fillStyle = '#c8102e';
  cctx.font = 'bold 64px sans-serif';
  cctx.textAlign = 'center';
  cctx.fillText('VERDICT', 256, 90);
  cctx.fillStyle = '#1a1a1a';
  cctx.font = 'bold 110px serif';
  cctx.fillText('K.O.', 256, 220);
  cctx.font = '28px sans-serif';
  cctx.fillStyle = '#888';
  cctx.fillText('SEE NOTECARD', 256, 300);
  const cardTex = new THREE.CanvasTexture(cardCanvas);
  const cardFace = new THREE.Mesh(
    new THREE.PlaneGeometry(1.36, 0.92),
    new THREE.MeshStandardMaterial({ map: cardTex, roughness: 0.85 })
  );
  cardFace.position.z = 0.04;
  card.add(cardFace);

  // Card starts in her right hand, lowered
  card.position.set(0.4, 1.5, 0);
  g.add(card);

  g.position.set(0, 0, 6); // far behind ring initially
  g.scale.set(0.95, 0.95, 0.95);
  g.visible = false;

  scene.add(g);
  return { group: g, head, armL, armR, card };
}
ringGirl = buildRingGirl();

/* ============================================================
   ANIMATION / BOUT LOGIC
   ============================================================ */
const clock = new THREE.Clock();
let fighters = []; // [fighter1, fighter2]
let bout = null;   // { startTime, endTime, winner, loser, move, quip, events: [...] }

// Animation state per fighter:
//   'idle' (bouncing), 'jab' (quick left punch), 'cross' (right punch),
//   'hook' (looping side punch), 'block' (arms up), 'stagger' (rocked back),
//   'ko' (lying on the mat), 'victory' (arms up celebrating)

function setFighterState(f, state, opts = {}) {
  f.state = state;
  f.stateTimer = 0;
  f.stateOpts = opts;
}

function updateFighter(f, t, dt) {
  const g = f.group;
  const phase = t * 4 + f.bobPhase;

  // Default arm rest positions (relative to shoulder)
  const restL = { rx: 1.4, rz: 0.3 };
  const restR = { rx: 1.4, rz: -0.3 };

  let targetArmL = { ...restL };
  let targetArmR = { ...restR };
  let bodyTilt = 0;
  let bobY = 0;
  let bodyZ = 0;
  let bodyRot = 0;

  switch (f.state) {
    case 'idle': {
      // Bounce + sway
      bobY = Math.sin(phase) * 0.04;
      bodyTilt = Math.sin(phase * 0.5) * 0.03;
      // Guard up slightly
      targetArmL = { rx: 1.1, rz: 0.5 };
      targetArmR = { rx: 1.1, rz: -0.5 };
      break;
    }
    case 'jab': {
      // Quick left punch forward (toward opponent = -z in local space since they face -z)
      const t0 = f.stateTimer / 0.3;
      const e = t0 < 0.4 ? t0 / 0.4 : 1 - (t0 - 0.4) / 0.6;
      const extend = Math.max(0, Math.min(1, e));
      targetArmL = { rx: -0.2 - extend * 1.0, rz: 0.1 };
      targetArmR = { rx: 1.1, rz: -0.5 };
      bodyZ = -extend * 0.15;
      if (f.stateTimer > 0.35) setFighterState(f, 'idle');
      break;
    }
    case 'cross': {
      const t0 = f.stateTimer / 0.35;
      const e = t0 < 0.35 ? t0 / 0.35 : 1 - (t0 - 0.35) / 0.65;
      const extend = Math.max(0, Math.min(1, e));
      targetArmR = { rx: -0.2 - extend * 1.0, rz: -0.05 };
      targetArmL = { rx: 1.0, rz: 0.4 };
      bodyZ = -extend * 0.2;
      bodyRot = extend * 0.15;
      if (f.stateTimer > 0.45) setFighterState(f, 'idle');
      break;
    }
    case 'hook': {
      const t0 = f.stateTimer / 0.4;
      const e = t0 < 0.4 ? t0 / 0.4 : 1 - (t0 - 0.4) / 0.6;
      const extend = Math.max(0, Math.min(1, e));
      targetArmR = { rx: 0.3, rz: -1.0 - extend * 0.4 };
      targetArmL = { rx: 1.1, rz: 0.4 };
      bodyRot = extend * 0.3;
      bodyZ = -extend * 0.1;
      if (f.stateTimer > 0.55) setFighterState(f, 'idle');
      break;
    }
    case 'block': {
      targetArmL = { rx: -0.3, rz: 0.3 };
      targetArmR = { rx: -0.3, rz: -0.3 };
      bodyZ = 0.08;
      if (f.stateTimer > 0.4) setFighterState(f, 'idle');
      break;
    }
    case 'stagger': {
      const k = Math.min(1, f.stateTimer / 0.25);
      bodyTilt = -0.4 * (1 - Math.abs(k - 0.5) * 2);
      bodyZ = 0.3 * k;
      targetArmL = { rx: 0.6, rz: 0.7 };
      targetArmR = { rx: 0.6, rz: -0.7 };
      if (f.stateTimer > 0.5) setFighterState(f, 'idle');
      break;
    }
    case 'ko': {
      // Lay down (flat on back)
      const k = Math.min(1, f.stateTimer / 1.2);
      g.position.y = -k * 0.0;
      // Pin the fighter, rotate to lay flat
      const targetTilt = -Math.PI / 2;
      // We use bodyTilt slot to drive torso tilt (but here we tilt the entire group)
      g.rotation.x = targetTilt * k;
      // Slide back slightly when falling
      g.position.z = (f.koZ ?? 0) - k * 0.6;
      // Arms splay
      targetArmL = { rx: 0.2, rz: 1.2 };
      targetArmR = { rx: 0.2, rz: -1.2 };
      break;
    }
    case 'victory': {
      // Arms up celebrating
      targetArmL = { rx: -2.2, rz: 0.5 };
      targetArmR = { rx: -2.2, rz: -0.5 };
      bobY = Math.abs(Math.sin(phase * 1.5)) * 0.18;
      break;
    }
  }

  // Apply arm rotations (smooth lerp)
  f.armL.rotation.x = THREE.MathUtils.lerp(f.armL.rotation.x, targetArmL.rx, 0.45);
  f.armL.rotation.z = THREE.MathUtils.lerp(f.armL.rotation.z, targetArmL.rz, 0.45);
  f.armR.rotation.x = THREE.MathUtils.lerp(f.armR.rotation.x, targetArmR.rx, 0.45);
  f.armR.rotation.z = THREE.MathUtils.lerp(f.armR.rotation.z, targetArmR.rz, 0.45);

  // Body bob (only when not in KO state)
  // bodyZ is the fighter's local-forward lean (negative = leaning toward opponent).
  // In world space, that corresponds to motion along the x-axis (the fighters face each other on x).
  // Left fighter (side=-1) faces +x; right fighter (side=+1) faces -x. facing = -f.side.
  if (f.state !== 'ko') {
    const facing = -f.side;
    g.position.y = bobY;
    g.position.x = f.side * 1.8 + (-bodyZ) * facing;
    g.position.z = 0;
    g.rotation.x = 0;
    f.torso.rotation.z = bodyTilt;
    f.torso.rotation.y = bodyRot;
    f.headGroup.rotation.z = bodyTilt * 0.5;
  }

  f.stateTimer += dt;
}

/* ----- Audio (synthesized) ----- */
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playBell() {
  ensureAudio();
  triggerBellSwing(1.0);
  const t = audioCtx.currentTime;
  // Multiple sine partials for a bell-like timbre
  const partials = [
    { f: 520, a: 0.4, d: 1.8 },
    { f: 780, a: 0.25, d: 1.4 },
    { f: 1100, a: 0.18, d: 1.1 },
    { f: 1640, a: 0.12, d: 0.7 },
  ];
  partials.forEach(p => {
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.value = p.f;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(p.a, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + p.d);
    o.connect(g).connect(audioCtx.destination);
    o.start(t);
    o.stop(t + p.d);
  });
}
function playPunch(power = 1) {
  ensureAudio();
  const t = audioCtx.currentTime;
  // Low thud
  const o = audioCtx.createOscillator();
  o.type = 'sine';
  o.frequency.setValueAtTime(180 * power, t);
  o.frequency.exponentialRampToValueAtTime(40, t + 0.15);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.3 * power, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
  o.connect(g).connect(audioCtx.destination);
  o.start(t);
  o.stop(t + 0.2);

  // Noise crack
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
  const n = audioCtx.createBufferSource();
  n.buffer = buf;
  const ng = audioCtx.createGain();
  ng.gain.value = 0.18 * power;
  n.connect(ng).connect(audioCtx.destination);
  n.start(t);
}
function playCrowd() {
  ensureAudio();
  const t = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 1.4, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) {
    const env = Math.min(1, i / 6000) * Math.min(1, (data.length - i) / 6000);
    data[i] = (Math.random() * 2 - 1) * env * 0.25;
  }
  const n = audioCtx.createBufferSource();
  n.buffer = buf;
  const g = audioCtx.createGain();
  g.gain.value = 0.45;
  // band-pass to roar
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 600;
  bp.Q.value = 0.7;
  n.connect(bp).connect(g).connect(audioCtx.destination);
  n.start(t);
}

/* ----- Bout Choreography ----- */
function planBout(b1, b2) {
  const key = mkKey(b1, b2);
  const match = MATCHUPS[key];
  if (!match) {
    return {
      winner: b1, loser: b2,
      move: 'an inconclusive shrug',
      quip: 'A schism was declared. Both fighters went home to write differently-worded essays about it.',
    };
  }
  const winner = match.winner;
  const loser = (winner === b1) ? b2 : b1;
  return { winner, loser, move: match.move, quip: match.quip };
}

function generateEvents(durationS, winnerIsRight) {
  // Generate a sequence of punches/dodges over the duration.
  // Winner lands more punches; loser staggers at the end.
  const events = [];
  let t = 1.0;
  while (t < durationS - 3.0) {
    const winnerAttacks = Math.random() < 0.65;
    const attacker = winnerAttacks ? 'winner' : 'loser';
    const defender = winnerAttacks ? 'loser' : 'winner';
    const moveRoll = Math.random();
    const move = moveRoll < 0.45 ? 'jab' : moveRoll < 0.78 ? 'cross' : 'hook';
    events.push({ t, type: 'attack', attacker, defender, move, lands: winnerAttacks || Math.random() < 0.5 });
    t += 0.55 + Math.random() * 0.7;
  }
  // Final stagger + finishing move at the end
  events.push({ t: durationS - 2.6, type: 'attack', attacker: 'winner', defender: 'loser', move: 'cross', lands: true, big: true });
  events.push({ t: durationS - 2.2, type: 'stagger', who: 'loser' });
  events.push({ t: durationS - 1.6, type: 'attack', attacker: 'winner', defender: 'loser', move: 'hook', lands: true, finisher: true });
  events.push({ t: durationS - 1.2, type: 'ko', who: 'loser' });
  events.push({ t: durationS - 0.6, type: 'victory', who: 'winner' });
  return events;
}

function clearFighters() {
  fighters.forEach(f => scene.remove(f.group));
  fighters = [];
}

function startBout(b1, b2) {
  clearFighters();
  // Hide notecard / replay
  document.getElementById('notecard-wrap').classList.remove('show');
  document.getElementById('replay').classList.remove('show');
  document.getElementById('fighter-tags').classList.add('show');
  document.getElementById('timer').classList.add('show');

  // Spawn fighters
  const f1 = buildFighter(b1, -1); // left/blue
  const f2 = buildFighter(b2, 1);  // right/red
  scene.add(f1.group);
  scene.add(f2.group);
  fighters = [f1, f2];

  // Tag display
  document.getElementById('tag1').textContent = b1.toUpperCase();
  document.getElementById('tag2').textContent = b2.toUpperCase();

  // Move ring girl off-stage
  ringGirl.group.visible = false;
  ringGirl.group.position.set(0, 0, 7);
  ringGirl.armL.rotation.set(0, 0, 0);
  ringGirl.armR.rotation.set(0, 0, 0);
  ringGirl.card.position.set(0.4, 1.5, 0);

  // Plan bout
  const plan = planBout(b1, b2);
  const winnerIsB1 = plan.winner === b1;
  const winnerFighter = winnerIsB1 ? f1 : f2;
  const loserFighter = winnerIsB1 ? f2 : f1;

  const duration = 28 + Math.random() * 3; // ~28-31s of action
  const events = generateEvents(duration, !winnerIsB1);

  bout = {
    startTime: clock.getElapsedTime(),
    duration,
    winner: winnerFighter,
    loser: loserFighter,
    winnerName: plan.winner,
    loserName: plan.loser,
    move: plan.move,
    quip: plan.quip,
    events,
    eventIdx: 0,
    state: 'fighting',
    finalShown: false,
  };

  // Round 1 banner
  const ri = document.getElementById('round-info');
  ri.textContent = 'ROUND 1';
  ri.classList.remove('show');
  void ri.offsetWidth;
  ri.classList.add('show');

  // Bell + crowd
  playBell();
  setTimeout(playBell, 280);
  setTimeout(playCrowd, 350);

  // Disable button until bout finishes
  document.getElementById('ringbell').disabled = true;
  document.getElementById('ringbell').textContent = 'FIGHTING…';
}

function endBout() {
  if (!bout) return;
  bout.state = 'verdict';
  document.getElementById('timer').classList.remove('show');

  // Final bell
  playBell();
  setTimeout(playBell, 220);

  // Show ring girl walking in
  ringGirl.group.visible = true;
  ringGirl.group.position.set(0, 0, 7);
  ringGirl.entryStart = clock.getElapsedTime();

  // Populate notecard
  const winnerName = bout.winnerName;
  const loserName = bout.loserName;
  const move = bout.move;
  const quip = bout.quip;
  document.getElementById('nc-winner').textContent =
    `${winnerName.toUpperCase()} defeats ${loserName.toUpperCase()}`;
  document.getElementById('nc-move').textContent =
    `Winning move: ${move}.`;
  document.getElementById('nc-quip').textContent = `“${quip}”`;

  // Reveal card after the ring girl finishes walking + raising
  setTimeout(() => {
    document.getElementById('notecard-wrap').classList.add('show');
    document.getElementById('replay').classList.add('show');
    document.getElementById('ringbell').disabled = false;
    document.getElementById('ringbell').textContent = 'RING THE BELL';
  }, 3400);
}

/* ----- Per-frame update ----- */
function updateBout(t, dt) {
  if (!bout) return;
  const elapsed = t - bout.startTime;

  // Update timer display
  const remaining = Math.max(0, Math.ceil(bout.duration - elapsed));
  document.getElementById('timer').textContent = remaining;

  // Process scheduled events
  while (bout.eventIdx < bout.events.length && bout.events[bout.eventIdx].t <= elapsed) {
    const ev = bout.events[bout.eventIdx];
    handleEvent(ev);
    bout.eventIdx++;
  }

  // End-of-bout transition
  if (bout.state === 'fighting' && elapsed >= bout.duration) {
    endBout();
  }

  // Animate ring girl entry + card raise
  if (bout.state === 'verdict' && ringGirl.entryStart != null) {
    const e = t - ringGirl.entryStart;
    // Walk from z=7 to z=2 over 2 seconds
    const walkT = Math.min(1, e / 2.0);
    const eased = walkT * walkT * (3 - 2 * walkT);
    ringGirl.group.position.z = 7 - eased * 5; // ends at 2
    // bob legs slightly
    ringGirl.group.position.y = Math.abs(Math.sin(e * 7)) * 0.06 * (1 - walkT);
    // After walk, raise card
    if (e > 1.9) {
      const rT = Math.min(1, (e - 1.9) / 1.0);
      const re = rT * rT * (3 - 2 * rT);
      // Right arm rotates up, card follows
      ringGirl.armR.rotation.x = -re * 2.6;
      ringGirl.card.position.set(0.1, 1.5 + re * 1.4, -0.2 + re * 0.3);
      ringGirl.card.rotation.z = re * 0.1;
    }
  }
}

function handleEvent(ev) {
  if (!bout) return;
  const winner = bout.winner;
  const loser = bout.loser;

  if (ev.type === 'attack') {
    const att = ev.attacker === 'winner' ? winner : loser;
    const def = ev.defender === 'winner' ? winner : loser;
    setFighterState(att, ev.move);
    if (ev.lands) {
      // small recoil on defender
      setTimeout(() => {
        if (def.state !== 'ko') {
          // Brief flinch via stagger-lite
          def.bobPhase += 1.3;
          // Tiny push back
          // (No direct position change; idle bob covers it)
        }
      }, 180);
      setTimeout(() => playPunch(ev.big || ev.finisher ? 1.6 : 1.0), 200);
    }
  } else if (ev.type === 'stagger') {
    const who = ev.who === 'winner' ? winner : loser;
    setFighterState(who, 'stagger');
    setTimeout(playCrowd, 200);
  } else if (ev.type === 'ko') {
    const who = ev.who === 'winner' ? winner : loser;
    who.koZ = who.group.position.z;
    setFighterState(who, 'ko');
    playPunch(2.0);
    setTimeout(playCrowd, 100);
  } else if (ev.type === 'victory') {
    const who = ev.who === 'winner' ? winner : loser;
    setFighterState(who, 'victory');
  }
}

/* ============================================================
   MAIN LOOP
   ============================================================ */
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const dt = Math.min(0.05, clock.getDelta());

  // Update audience sway
  audience.children.forEach(c => {
    c.position.y = c.userData.baseY + Math.sin(t * 2.5 + c.userData.basePhase) * 0.04;
  });

  // Brass bell swing — damped oscillation; clapper lags for clang feel
  if (bellSwingEnergy > 0.005) {
    bellSwingTime += dt;
    bellSwingEnergy *= Math.pow(0.35, dt); // decay
    const swing = Math.sin(bellSwingTime * 16) * bellSwingEnergy * 0.55;
    brassBell.pivot.rotation.z = swing;
    // Clapper offset (phase-lagged) — gives the impression of an inner clapper striking the walls
    brassBell.clapperBall.position.x = Math.sin(bellSwingTime * 16 + 1.1) * bellSwingEnergy * 0.18;
  } else {
    brassBell.pivot.rotation.z *= 0.9;
    brassBell.clapperBall.position.x *= 0.9;
  }

  // Update fighters
  fighters.forEach(f => updateFighter(f, t, dt));

  // Update bout
  if (bout) updateBout(t, dt);

  // Subtle camera sway
  camera.position.x = Math.sin(t * 0.1) * 0.3;
  camera.lookAt(0, 1.5, 0);

  renderer.render(scene, camera);
}

/* ============================================================
   UI WIRING
   ============================================================ */
function populateSelects() {
  const s1 = document.getElementById('fighter1');
  const s2 = document.getElementById('fighter2');
  BELIEFS.forEach((b, i) => {
    const o1 = document.createElement('option');
    o1.value = b; o1.textContent = b;
    s1.appendChild(o1);
    const o2 = document.createElement('option');
    o2.value = b; o2.textContent = b;
    s2.appendChild(o2);
  });
  s1.value = 'Catholicism';
  s2.value = 'Science';
}
populateSelects();

document.getElementById('ringbell').addEventListener('click', () => {
  ensureAudio();
  const b1 = document.getElementById('fighter1').value;
  const b2 = document.getElementById('fighter2').value;
  if (b1 === b2) {
    // Same-vs-same: pick a random different one for B2
    const others = BELIEFS.filter(x => x !== b1);
    document.getElementById('fighter2').value = others[Math.floor(Math.random() * others.length)];
  }
  startBout(
    document.getElementById('fighter1').value,
    document.getElementById('fighter2').value
  );
});

document.getElementById('replay').addEventListener('click', () => {
  document.getElementById('notecard-wrap').classList.remove('show');
  document.getElementById('replay').classList.remove('show');
  // Same matchup again, with fresh bell ring
  startBout(
    document.getElementById('fighter1').value,
    document.getElementById('fighter2').value
  );
});
